[workspace]
name = "ssuextract"
version = "1.2.1"
description = "SSU extraction tools using Nextflow pipeline"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
# Core tools
python = ">=3.10,<3.15"
nextflow = ">=25.4,<26"
zstd = ">=1.5,<2"        # database release archives

# Bioinformatics tools
infernal = ">=1.1.5,<1.2" # provides cmsearch
blast = ">=2.16,<3"       # provides blastn
iqtree = ">=3.0,<4"       # optional tree-neighbor classification

# Python packages
biopython = ">=1.85,<2"
duckdb = ">=1.4,<2"      # selective taxonomy lookup from Parquet
ete4 = ">=4.4,<5"         # tree distances and neighbor traversal

[tasks]
# Download the default database
download-db = { cmd = "bash scripts/pipeline_cli.sh setup", description = "Select and install a database profile" }

# Setup: resolve the database path and download the database
setup = { cmd = "bash scripts/pipeline_cli.sh setup", description = "Select, install, or update a database profile" }

# Run the full pipeline
ssuextract = { cmd = "bash scripts/pipeline_cli.sh run", description = "Run the full pipeline with automatic database setup" }

# Run the bundled two-assembly example
example = { cmd = "bash scripts/pipeline_cli.sh smoke", description = "Run the bundled example with 16S rRNA gene and 18S rRNA gene annotations" }

# Verification gates
test-unit = { cmd = "python -m unittest discover -s tests -v", description = "Run Python unit tests" }
test-integration = { cmd = "bash tests/test_pipeline_no_hits.sh", description = "Run the absolute-path no-hit pipeline test" }
test-database-profiles = { cmd = "bash tests/test_pipeline_database_profiles.sh", description = "Run marker-specific database routing integration" }
test-tree-classification = { cmd = "bash tests/test_pipeline_tree_classification.sh", description = "Run optional tree-neighbor classification integration" }
test-version = { cmd = "python scripts/check_version.py", description = "Check release version consistency" }
test = { depends-on = ["test-unit", "test-integration", "test-database-profiles", "test-tree-classification", "test-version"], description = "Run all automated tests" }

# Clean outputs
clean = "nextflow clean -f"

# Clean results directory (use with caution)
clean-results = { cmd = "rm -rf results/ work/", description = "Remove all results and work directories" }

# Dry run to see what will be executed
dryrun = "nextflow run main.nf -preview"

# Generate pipeline visualization
dag = "bash scripts/pipeline_cli.sh run -with-dag pipeline.svg"

[environments]
dev = ["dev"]

[feature.dev.dependencies]
# Development dependencies
graphviz = "*"           # for DAG visualization

[feature.dev.tasks]
# Run with detailed output
run-verbose = "bash scripts/pipeline_cli.sh run -with-trace -with-timeline -with-report"

# Create pipeline report
report = "bash scripts/pipeline_cli.sh run -with-report report.html"
